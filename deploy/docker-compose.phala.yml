services:
  ssh:
    build:
      context: .
      dockerfile_inline: |
        FROM ubuntu:22.04
        RUN apt-get update && apt-get install -y openssh-server curl jq
        RUN mkdir /run/sshd
        RUN echo 'root:loginwitheverything' | chpasswd
        RUN sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        RUN sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        RUN sed -i 's/#Port 22/Port 1022/' /etc/ssh/sshd_config
        CMD ["/usr/sbin/sshd", "-D"]
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  vpn:
    image: ghcr.io/amiller/openvpn-socks5@sha256:287ca89cb223f70a607ea24f5bf7fc99d6484c5630ff43585a316a8342c3a620
    privileged: true
    cap_add:
      - NET_ADMIN
    networks:
      lwa-net:
        ipv4_address: 17.100.0.2
    environment:
      SOCKS5_PORT: "1080"
      DAEMON_MODE: "true"
      OPENVPN_USER: ${OPENVPN_USER}
      OPENVPN_PASS: ${OPENVPN_PASS}
      OVPN_CONFIG_BASE64: ${OVPN_CONFIG_BASE64}

  browser:
    image: ghcr.io/amiller/login-with-anything-browser@sha256:9a228ac477eeb50a316291c464934a9d4426872b09eb061e43543ff6755be93e
    depends_on:
      - vpn
    networks:
      lwa-net:
        ipv4_address: 17.100.0.3
    ports:
      - "3000:3000"
    shm_size: 2gb
    cap_add:
      - SYS_ADMIN
    environment:
      NEKO_DESKTOP_SCREEN: "1920x1080@30"
      NEKO_WEBRTC_ICELITE: "true"
      NEKO_WEBRTC_TCPMUX: "56000"
      NEKO_NAT1TO1: "127.0.0.1"
      NEKO_WEBRTC_ICESERVERS_FRONTEND: ""
      NEKO_WEBRTC_ICESERVERS_BACKEND: ""
      NEKO_MEMBER_PROVIDER: multiuser
      NEKO_MEMBER_MULTIUSER_USER_PASSWORD: proof
      NEKO_MEMBER_MULTIUSER_ADMIN_PASSWORD: proof_admin
      PROXY_URL: "socks5://17.100.0.2:1080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      retries: 10
      timeout: 5s

  app:
    image: ghcr.io/amiller/login-with-anything-app@sha256:c1fa9c0e43ea943cb86e55b857224817295b8d47681474b67f434536a531d9e0
    depends_on:
      browser:
        condition: service_healthy
    networks:
      lwa-net:
        ipv4_address: 17.100.0.4
    ports:
      - "3003:3003"
    volumes:
      - forum-data:/data
    environment:
      PORT: "3003"
      DB_PATH: "/data/forum.db"
      TEE_BROWSER_URL: "http://17.100.0.3:3000"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"

networks:
  lwa-net:
    ipam:
      driver: default
      config:
        - subnet: 17.100.0.0/16

volumes:
  forum-data:
