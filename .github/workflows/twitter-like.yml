name: Login with Twitter Like

on:
  workflow_dispatch:
    inputs:
      tweet_id:
        description: 'Tweet ID to observe'
        required: true
      gist_id:
        description: 'Gist ID for signaling tunnel URL'
        required: true

permissions:
  id-token: write
  contents: read
  attestations: write

jobs:
  observe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ngrok
        run: |
          curl -s https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz | tar xz
          ./ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}

      - name: Start tap server and ngrok
        env:
          TWEET_ID: ${{ inputs.tweet_id }}
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GIST_ID: ${{ inputs.gist_id }}
        run: |
          cd workflow && node tap-server.js &
          sleep 2

          cd $GITHUB_WORKSPACE
          ./ngrok http 8765 --log=stderr > /tmp/ngrok.log 2>&1 &
          NGROK_PID=$!

          for i in $(seq 1 15); do
            sleep 3
            if ! kill -0 $NGROK_PID 2>/dev/null; then
              echo "ngrok died!"; cat /tmp/ngrok.log; exit 1
            fi
            TUNNEL=$(curl -s http://localhost:4040/api/tunnels 2>/dev/null | python3 -c "import sys,json; t=json.load(sys.stdin)['tunnels']; print(t[0]['public_url'] if t else '')" 2>/dev/null || echo "")
            if [ -n "$TUNNEL" ]; then break; fi
            echo "Waiting for ngrok... attempt $i"
          done

          if [ -z "$TUNNEL" ]; then echo "No tunnel"; cat /tmp/ngrok.log; exit 1; fi

          echo "Tunnel: $TUNNEL"

          # Signal tunnel URL via gist (one write)
          curl -s -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/gists/$GIST_ID" \
            -d "{\"files\":{\"status.json\":{\"content\":\"{\\\"status\\\":\\\"ready\\\",\\\"tunnel\\\":\\\"$TUNNEL\\\"}\"}}}"

          echo "Gist updated with tunnel URL"

          # Wait for taps (tap-server exits after 7 or timeout)
          sleep 180 || true

      - name: Attest result
        if: always()
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: workflow/output/result.json
