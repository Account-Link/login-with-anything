name: Login with Twitter Like

on:
  workflow_dispatch:
    inputs:
      tweet_id:
        description: 'Tweet ID to observe'
        required: true

permissions:
  id-token: write
  contents: read
  attestations: write

jobs:
  observe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ngrok
        run: |
          curl -s https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz | tar xz
          ./ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}

      - name: Start tap server and ngrok
        id: server
        env:
          TWEET_ID: ${{ inputs.tweet_id }}
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
          TWITTER_PROXY: ${{ secrets.NGROK_PROXY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Start tap server
          cd workflow && node tap-server.js &
          sleep 2

          # Start ngrok
          cd $GITHUB_WORKSPACE
          ./ngrok http 8765 --log=stdout > /tmp/ngrok.log 2>&1 &
          sleep 3

          # Get tunnel URL
          TUNNEL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "import sys,json; t=json.load(sys.stdin)['tunnels']; print(t[0]['public_url'] if t else '')")
          echo "Tap server tunnel: $TUNNEL"
          echo "tunnel_url=$TUNNEL" >> $GITHUB_OUTPUT

          # Wait for tap server to finish (7 taps or timeout)
          wait -n || true

      - name: Attest result
        if: always()
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: workflow/output/result.json
