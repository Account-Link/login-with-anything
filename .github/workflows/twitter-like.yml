name: Login with Twitter Like

on:
  workflow_dispatch:
    inputs:
      tweet_id:
        description: 'Tweet ID to observe'
        required: true
      gist_id:
        description: 'Gist ID for status signaling'
        required: true
      proxy_url:
        description: 'API proxy URL (optional override)'
        required: false

permissions:
  id-token: write
  contents: read
  attestations: write

jobs:
  observe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Observe like state
        env:
          TWEET_ID: ${{ inputs.tweet_id }}
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
          TWITTER_PROXY: ${{ inputs.proxy_url || secrets.NGROK_PROXY }}
          GIST_ID: ${{ inputs.gist_id }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          TIMEOUT: '120000'
        run: |
          mkdir -p workflow/output
          cd workflow
          node adapters/twitter-like.js

      - name: Attest result
        if: always()
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: workflow/output/result.json
