name: Verify Login

# Generic cookie-verification workflow dispatched by the Login with
# Everything browser extension. The extension uploads cookies to a private
# gist, then dispatches this workflow with the gist id and target domain.
# We pull the cookies, run the same TEE browser image we use on the Phala
# CVM, navigate to the site, and produce an attested screenshot artifact.

on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Site to verify (e.g. reddit.com)'
        required: true
      gist_id:
        description: 'Gist ID containing session.json with cookies'
        required: true

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Pull cookies from gist
        env:
          # Reuses the existing GH_PAT secret (also used by twitter-like.yml).
          # Needs gist scope to read the user's private session gist.
          GH_TOKEN_RAW: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN_RAW" ]; then
            echo "::error::GH_PAT secret is not set on this repo."
            echo "Add a PAT with 'gist' scope as the GH_PAT repo secret."
            exit 1
          fi
          # Strip whitespace/newlines that crept in when the secret was set —
          # otherwise Go's http client rejects the Authorization header.
          GH_TOKEN=$(printf '%s' "$GH_TOKEN_RAW" | tr -d '\r\n\t ')
          export GH_TOKEN
          gh api gists/${{ inputs.gist_id }} > /tmp/gist.json
          jq -r '.files["session.json"].content' /tmp/gist.json > /tmp/cookies.json
          n=$(jq 'length' /tmp/cookies.json)
          echo "Pulled $n cookies for ${{ inputs.domain }}"
          if [ "$n" = "0" ]; then echo "::error::gist has no cookies"; exit 1; fi

      - name: Start OpenVPN + SOCKS5 sidecar (residential egress)
        id: vpn
        env:
          OPENVPN_USER: ${{ secrets.OPENVPN_USER }}
          OPENVPN_PASS: ${{ secrets.OPENVPN_PASS }}
          OVPN_CONFIG_BASE64: ${{ secrets.OVPN_CONFIG_BASE64 }}
        run: |
          docker network create lwa-net 2>/dev/null || true
          if [ -z "$OPENVPN_USER" ] || [ -z "$OVPN_CONFIG_BASE64" ]; then
            echo "::warning::VPN secrets not set; egress will be the github runner IP."
            echo "::warning::Sites with strong anti-bot (reddit, x.com) will block."
            echo "proxy_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Same image we pin on the Phala CVM (deploy/docker-compose.phala.yml)
          docker run -d --name lwa-vpn \
            --network lwa-net \
            --privileged \
            --cap-add NET_ADMIN \
            --device /dev/net/tun \
            -e SOCKS5_PORT=1080 \
            -e DAEMON_MODE=true \
            -e OPENVPN_USER -e OPENVPN_PASS -e OVPN_CONFIG_BASE64 \
            ghcr.io/amiller/openvpn-socks5@sha256:287ca89cb223f70a607ea24f5bf7fc99d6484c5630ff43585a316a8342c3a620
          ip=""
          for i in $(seq 1 45); do
            ip=$(docker exec lwa-vpn curl -s --max-time 5 https://api.ipify.org 2>/dev/null || true)
            if [ -n "$ip" ]; then break; fi
            sleep 2
          done
          if [ -z "$ip" ]; then
            echo "::error::VPN failed to come up after 90s"
            docker logs lwa-vpn | tail -50
            exit 1
          fi
          echo "VPN egress IP: $ip"
          echo "proxy_url=socks5://lwa-vpn:1080" >> "$GITHUB_OUTPUT"

      - name: Start TEE browser container
        run: |
          docker run -d --name lwa-browser \
            --network lwa-net \
            --shm-size=2gb \
            --cap-add=SYS_ADMIN \
            -p 3000:3000 \
            -e PROXY_URL="${{ steps.vpn.outputs.proxy_url }}" \
            ghcr.io/amiller/login-with-anything-browser@sha256:9a228ac477eeb50a316291c464934a9d4426872b09eb061e43543ff6755be93e
          for i in $(seq 1 30); do
            if curl -fs http://localhost:3000/health >/dev/null 2>&1; then
              echo "Bridge ready after ${i}s"; break
            fi
            sleep 2
          done
          curl -fs http://localhost:3000/health || (docker logs lwa-browser; exit 1)

      - name: Determine target URL
        id: target
        run: |
          DOMAIN="${{ inputs.domain }}"
          case "$DOMAIN" in
            *reddit*)              URL="https://www.reddit.com/" ;;
            *nytimes*|*wordle*)    URL="https://www.nytimes.com/games/wordle" ;;
            *twitter*|*x.com*)     URL="https://x.com/home" ;;
            *github.com*)          URL="https://github.com/" ;;
            *anthropic*)           URL="https://console.anthropic.com/" ;;
            *)                     URL="https://${DOMAIN}/" ;;
          esac
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Target: $URL"

      - name: Inject cookies, navigate, capture
        run: |
          mkdir -p proof

          # Bridge /session expects {"cookies": [...]}
          jq '{cookies: .}' /tmp/cookies.json > /tmp/session.json
          curl -fsS -X POST http://localhost:3000/session \
            -H "Content-Type: application/json" -d @/tmp/session.json

          # Navigate
          curl -fsS -X POST http://localhost:3000/navigate \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"${{ steps.target.outputs.url }}\"}"
          sleep 6

          # Screenshot
          curl -fsS http://localhost:3000/screenshot -o proof/screenshot.png
          ls -la proof/screenshot.png

          # Capture page state for the certificate
          curl -fsS -X POST http://localhost:3000/capture > proof/capture.json || echo '{}' > proof/capture.json

          # Sanity-check: detect login pages
          TITLE=$(jq -r '.certificate.pageInfo.title // ""' proof/capture.json)
          BODY=$(jq -r '.certificate.pageInfo.bodyText // ""' proof/capture.json | head -c 500)
          echo "Title: $TITLE"
          if echo "$TITLE" | grep -iq "log in\|sign in"; then
            echo "::warning::Page title looks like a login page — cookie may not have authenticated"
          fi

          cat > proof/certificate.json <<EOF
          {
            "type": "login-with-anything-proof",
            "domain": "${{ inputs.domain }}",
            "url": "${{ steps.target.outputs.url }}",
            "page_title": $(jq -Rs . <<<"$TITLE"),
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "github_run_id": "${{ github.run_id }}",
            "github_run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          cat proof/certificate.json

      - name: Upload proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: lwa-proof-${{ inputs.domain }}-${{ github.run_id }}
          path: proof/
          retention-days: 90

      - name: Attest screenshot
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: proof/screenshot.png

      - name: Cleanup
        if: always()
        run: |
          docker rm -f lwa-browser 2>/dev/null || true
          docker rm -f lwa-vpn 2>/dev/null || true
