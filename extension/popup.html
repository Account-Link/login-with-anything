<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { width: 340px; font-family: system-ui; font-size: 13px; margin: 0; padding: 12px; }
  h1 { font-size: 15px; margin: 0 0 8px; color: #2255cc; }
  .current { padding: 10px; background: #f0f7ff; border-radius: 6px; margin-bottom: 10px; }
  .current .domain { font-weight: 600; font-size: 14px; }
  .current .count { color: #666; font-size: 11px; }
  .actions { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  button { width: 100%; padding: 8px; cursor: pointer; border: none; border-radius: 6px; font-size: 13px; }
  .btn-tee { background: #2255cc; color: white; }
  .btn-tee:hover { background: #1a44aa; }
  .btn-gh { background: #24292e; color: white; }
  .btn-gh:hover { background: #1b1f23; }
  .btn-tee:disabled, .btn-gh:disabled { opacity: 0.5; cursor: default; }
  #status { margin: 8px 0; font-size: 12px; text-align: center; padding: 6px; border-radius: 4px; display: none; }
  #status.ok { display: block; background: #dcfce7; color: #166534; }
  #status.err { display: block; background: #fee2e2; color: #991b1b; }
  #status.wait { display: block; background: #dbeafe; color: #1e40af; }
  .history { border-top: 1px solid #eee; padding-top: 8px; margin-top: 8px; }
  .history h2 { font-size: 12px; color: #999; margin: 0 0 6px; }
  .login-entry { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #f5f5f5; font-size: 11px; }
  .login-entry .domain { font-weight: 500; }
  .login-entry .meta { color: #999; }
  .login-entry .clear { cursor: pointer; color: #ccc; font-size: 14px; }
  .login-entry .clear:hover { color: #ef4444; }
  .settings { border-top: 1px solid #eee; padding-top: 8px; margin-top: 8px; }
  .settings summary { font-size: 11px; color: #999; cursor: pointer; }
  .settings input { width: 100%; padding: 4px 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 11px; margin: 3px 0; font-family: monospace; }
  .settings label { font-size: 11px; color: #666; }
  .settings button { font-size: 11px; padding: 4px; margin-top: 4px; background: #eee; color: #333; }
</style>
</head>
<body>
  <h1>Login with Everything</h1>
  <div id="current" class="current"></div>
  <div class="actions">
    <button class="btn-tee" id="btnTee">Verify via TEE</button>
    <button class="btn-gh" id="btnGh">Verify via GitHub Actions</button>
  </div>
  <div id="status"></div>
  <div class="history">
    <h2>Recent logins</h2>
    <div id="history"></div>
  </div>
  <a id="dash" href="#" style="display:block;text-align:center;margin:8px 0;color:#2255cc;font-size:12px;text-decoration:none;">Open Dashboard</a>
  <details class="settings">
    <summary>Settings</summary>
    <label>Forum URL</label>
    <input id="forumUrl" placeholder="https://your-tee-3003.dstack...">
    <label>TEE Bridge URL (optional, auto from forum)</label>
    <input id="teeUrl" placeholder="http://browser:3000">
    <label>GitHub PAT (for Actions path)</label>
    <input id="ghToken" type="password" placeholder="ghp_...">
    <label>GitHub Repo</label>
    <input id="ghRepo" placeholder="owner/repo">
    <button id="saveSettings">Save</button>
  </details>
  <script src="popup.js"></script>
</body>
</html>
