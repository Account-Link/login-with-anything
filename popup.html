<!DOCTYPE html>
<html>
<head>
<title>Login with Anything</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui; background: #0a0a0a; color: #e5e5e5; width: 360px; padding: 20px; }
h1 { font-size: 16px; margin-bottom: 4px; }
.sub { font-size: 11px; color: #888; margin-bottom: 16px; }
label { font-size: 11px; color: #888; display: block; margin-bottom: 3px; }
input, select { background: #1a1a1a; color: #e5e5e5; border: 1px solid #333; border-radius: 6px; padding: 5px 8px; font-size: 12px; width: 100%; }
.field { margin-bottom: 12px; }
.btn { padding: 6px 14px; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: #e5e5e5; font-size: 12px; cursor: pointer; }
.btn:hover { background: #262626; }
.btn.primary { border-color: #1d9bf0; color: #1d9bf0; }
.btn.primary:hover { background: #1d9bf022; }
.actions { display: flex; gap: 8px; margin-top: 12px; }
#status { font-size: 11px; color: #888; margin-top: 8px; min-height: 14px; }
hr { border: none; border-top: 1px solid #262626; margin: 12px 0; }
</style>
</head>
<body>
  <h1>Login with Anything</h1>
  <p class="sub">Configure observer and dispatch workflows</p>

  <div class="field">
    <label>Observer Mode</label>
    <select id="mode">
      <option value="local">Local (localhost:3456)</option>
      <option value="gist">GitHub Gist</option>
    </select>
  </div>

  <div class="field" id="gist-fields" style="display:none">
    <label>Gist ID (for status signaling)</label>
    <input id="gist-id" type="text" placeholder="abc123...">
    <label style="margin-top:6px">GitHub Token</label>
    <input id="gh-token" type="password" placeholder="ghp_...">
  </div>

  <hr>
  <div class="field">
    <label>GitHub Repo</label>
    <input id="repo" type="text" value="amiller/login-with-anything">
  </div>

  <div class="actions">
    <button class="btn primary" id="save">Save Settings</button>
    <button class="btn" id="dispatch-star">Dispatch: Star</button>
  </div>
  <div id="status"></div>

<script>
const $ = id => document.getElementById(id);

$('mode').addEventListener('change', () => {
  $('gist-fields').style.display = $('mode').value === 'gist' ? 'block' : 'none';
});

// Load saved settings
chrome.storage.local.get(['observerMode', 'gistId', 'ghToken', 'repo'], cfg => {
  if (cfg.observerMode) $('mode').value = cfg.observerMode;
  if (cfg.gistId) $('gist-id').value = cfg.gistId;
  if (cfg.ghToken) $('gh-token').value = cfg.ghToken;
  if (cfg.repo) $('repo').value = cfg.repo;
  $('mode').dispatchEvent(new Event('change'));
});

$('save').addEventListener('click', () => {
  chrome.storage.local.set({
    observerMode: $('mode').value,
    gistId: $('gist-id').value,
    ghToken: $('gh-token').value,
    repo: $('repo').value,
  });
  $('status').textContent = 'Saved';
});

$('dispatch-star').addEventListener('click', async () => {
  const cfg = await chrome.storage.local.get(['ghToken', 'repo']);
  if (!cfg.ghToken) { $('status').textContent = 'Need GitHub token'; return; }
  $('status').textContent = 'Dispatching...';
  const res = await fetch(`https://api.github.com/repos/${cfg.repo}/actions/workflows/github-star.yml/dispatches`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${cfg.ghToken}`,
      'Accept': 'application/vnd.github.v3+json',
    },
    body: JSON.stringify({ ref: 'main', inputs: { repo: cfg.repo } }),
  });
  $('status').textContent = res.ok ? 'Dispatched! Star/unstar the repo in rhythm.' : `Error: ${res.status}`;
});
</script>
</body>
</html>
