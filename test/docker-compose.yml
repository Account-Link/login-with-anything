services:
  browser:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shave-test
    shm_size: 2gb
    cap_add:
      - SYS_ADMIN
    ports:
      - "8080:8080"
      - "56000:56000"
      - "9222:9222"
      - "3456:3456"
    environment:
      NEKO_DESKTOP_SCREEN: "1280x800@30"
      NEKO_WEBRTC_ICELITE: "true"
      NEKO_WEBRTC_TCPMUX: "56000"
      NEKO_NAT1TO1: "127.0.0.1"
      NEKO_WEBRTC_ICESERVERS_FRONTEND: ""
      NEKO_WEBRTC_ICESERVERS_BACKEND: ""
      NEKO_MEMBER_PROVIDER: noauth
    volumes:
      - ../:/usr/share/chromium/extensions/shave-src:ro
